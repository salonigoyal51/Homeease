<!DOCTYPE html>
<html>
<head>
    <title>My Bookings - HomeEase</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        /* Push content below fixed navbar */
        body {
            padding-top: 75px;
            background: #f5f5f5;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar (same as index.html) -->
<nav class="navbar">
    <div class="logo">
        <img src="pnglogo.png" alt="HomeEase logo">
        <h2>HomeEase</h2>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <div class="nav-right" id="navMenu">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>

        <span id="username"></span>

        <a href="dashboard.html">My Bookings</a>
        <a href="contact.html">Contact</a>

        <span class="material-icons icon" onclick="showNotification()">notifications</span>
        <span class="material-icons icon" onclick="toggleDarkMode()">dark_mode</span>

        <span class="material-icons profile-icon" onclick="toggleDropdown()">account_circle</span>

        <div class="dropdown" id="dropdownMenu">
            <a href="register.html">My Account</a>
            <a href="setting.html">Settings</a>
            <a href="logout.html">Logout</a>
        </div>
    </div>
</nav>

<!-- Dashboard Content -->
<div class="container">
    <h1>My Bookings 📋</h1>

    <div class="tabs">
        <div class="tab active" onclick="showTab('active')">Active</div>
        <div class="tab" onclick="showTab('completed')">Completed</div>
    </div>

    <div id="activeBookings"></div>
    <div id="completedBookings" style="display:none;"></div>
</div>

<script>

function showTab(type) {
    let active = document.getElementById("activeBookings");
    let completed = document.getElementById("completedBookings");
    let tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => tab.classList.remove("active"));

    if (type === "active") {
        active.style.display = "block";
        completed.style.display = "none";
        tabs[0].classList.add("active");
    } else {
        active.style.display = "none";
        completed.style.display = "block";
        tabs[1].classList.add("active");
    }
}

// Show logged-in username in navbar
fetch("/HomeEase/backend/check_auth.php")
.then(res => res.json())
.then(data => {
    if (data.status === "logged_in") {
        document.getElementById("username").innerText = "Hi, " + data.user;
    }
});

fetch("/HomeEase/backend/get_bookings.php")
.then(res => res.json())
.then(data => {
    if (data.status === "error") {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    let activeDiv = document.getElementById("activeBookings");
    let completedDiv = document.getElementById("completedBookings");

    activeDiv.innerHTML = "";
    completedDiv.innerHTML = "";

    if (data.data.length === 0) {
        activeDiv.innerHTML = "<p style='text-align:center; margin-top:30px;'>No bookings yet.</p>";
        return;
    }

    data.data.forEach(booking => {
        let card = `<div class="card">
            <div class="info">
                <strong>${booking.service}</strong><br>
                📍 ${booking.address}<br>
                📅 ${booking.date} at ${booking.time}
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="status active-status">${booking.status}</div>
        ${booking.status === 'Active' ? `<button onclick="cancelBooking(${booking.id})" 
            style="background:#ff4444; color:white; border:none; padding:6px 14px; 
            border-radius:8px; cursor:pointer; font-size:12px;">Cancel</button>` : ''}
            </div>
            </div>`;

        if (booking.status === "Active") {
            activeDiv.innerHTML += card;
        } else {
            completedDiv.innerHTML += card;
        }
    });
});
function cancelBooking(id) {
    if (!confirm("Cancel this booking?")) return;

    let formData = new FormData();
    formData.append('id', id);

    fetch("/HomeEase/backend/cancel_booking.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            showToast("Booking cancelled ✅");
            setTimeout(() => location.reload(), 1500);
        }
    });
}
function showToast(msg, type = "success") {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        background: ${type === "success" ? "#ff9800" : "#e53935"};
        color: white; padding: 12px 25px;
        border-radius: 25px; font-family: Poppins;
        font-size: 14px; z-index: 9999;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        animation: fadeUp 0.4s ease;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("show");
}

function toggleDropdown() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
        let dropdown = document.getElementById("dropdownMenu");
        if (dropdown) dropdown.style.display = "none";
    }
}

function showNotification() {
    alert("No new notifications 🔔");
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
