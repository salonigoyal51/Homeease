<!-- Contact Form -->
<div class="contact-section">

    <div class="contact-box">
        <h2>Contact Us 📞</h2>
        <p>We’d love to hear from you!</p>

        <form id="contactForm">
            <div class="input-box">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>

            <div class="input-box">
                <textarea name="message" placeholder="Your Message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

</div>

<button onclick="topFunction()" id="topBtn"
style="position:fixed; bottom:20px; right:20px; padding:10px; display:none; background:orange; color:white; border:none; border-radius:50%;">
↑
</button>

<script>
window.onscroll = function() {
    let btn = document.getElementById("topBtn");
    if (document.documentElement.scrollTop > 200) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
};
function showNotification() {
    alert("No new notifications 🔔");
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
}
function showToast(msg, type = "success") {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        background: ${type === "success" ? "#ff9800" : "#e53935"};
        color: white; padding: 12px 25px;
        border-radius: 25px; font-family: Poppins;
        font-size: 14px; z-index: 9999;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        animation: fadeUp 0.4s ease;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
function topFunction() {
    document.documentElement.scrollTop = 0;
}
</script>



<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/HomeEase/backend/contact.php", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        alert("Message sent successfully 🎉");
        this.reset(); // form clear
    })
    .catch(error => {
        alert("Error ❌");
    });
});
</script>

function toggleDropdown() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";

</script>
