<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details & Booking</title>
    <link rel="stylesheet" href="css/service-details.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1581578731548-c64695cc6958?auto=format&fit=crop&q=80') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 900px;
            display: flex;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            min-height: 550px;
        }

        /* Left Side: Provider List */
        .provider-list-section {
            flex: 1;
            padding: 40px;
            background: white;
            border-right: 1px solid #eee;
        }

        /* Right Side: Booking Form */
        .booking-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { color: #333; margin-bottom: 20px; }
        .service-badge { background: #fff5e6; color: #ff9800; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

        /* Provider Card Styling */
        .provider-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .provider-card:hover, .provider-card.active {
            border-color: #ff9800;
            background: #fff9f0;
        }

        .provider-card img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #ff9800; }
        .provider-info h4 { font-size: 0.95rem; margin: 0; }
        .provider-info p { font-size: 0.8rem; color: #777; }

        /* Form Styling */
        label { display: block; font-size: 0.85rem; margin-top: 15px; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        input:focus { border-color: #ff9800; }

        .btn-confirm {
            width: 100%;
            padding: 15px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirm:hover { background: #e68900; }

        @media (max-width: 768px) {
            .glass-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="provider-list-section">
        <span class="service-badge" id="serviceTag">Service</span>
        <h2 id="serviceTitle">Available Providers</h2>
        <div id="providerContainer">
            </div>
    </div>

    <div class="booking-section" id="bookingFormArea">
        <h3>Book Appointment</h3>
        <p id="selectedProviderText" style="color: #666; font-size: 0.9rem;">Please select a professional</p>

        <form id="finalBookingForm">
            <label>Date</label>
            <input type="date" id="bookDate" required>

            <label>Preferred Time</label>
            <input type="time" id="bookTime" required>

            <label>Service Details</label>
            <input type="text" placeholder="Explain the problem briefly..." required>

            <button type="submit" class="btn-confirm">Confirm & Pay</button>
        </form>
    </div>
</div>

<script>
// Check login first
fetch('/HomeEase/backend/check_auth.php')
.then(res => res.json())
.then(data => {
    if(data.status !== 'logged_in') {
        alert('Please login first!');
        window.location.href = 'login.html';
    }
});

    // 1. Get the name from the address bar
    const urlParams = new URLSearchParams(window.location.search);
    const providerName = urlParams.get('provider'); // It looks for 'provider' because we used it in the link above

    // 2. Put it in your booking text
    if (providerName) {
        document.getElementById('selectedProviderText').innerHTML = "Booking with: <b>" + providerName + "</b>";
    }
    // 1. Data Object
    const allData = {
        'Electrician': [
        { name: 'Rahul Sharma', rating: '4.5', price: '300', img: 'https://randomuser.me/api/portraits/men/32.jpg' },
        { name: 'Amit Kumar', rating: '4.2', price: '250', img: 'https://randomuser.me/api/portraits/men/44.jpg' }
    ],
    'Plumbing': [
        { name: 'Sandeep Singh', rating: '4.8', price: '400', img: 'https://randomuser.me/api/portraits/men/65.jpg' }
    ],
    'Cleaning': [
        { name: 'Pooja Devi', rating: '4.7', price: '500', img: 'https://randomuser.me/api/portraits/women/44.jpg' }
    ],
    'Carpenter': [
        { name: 'Vikram Mistri', rating: '4.6', price: '350', img: 'https://randomuser.me/api/portraits/men/22.jpg' }
    ]
    };

    // 2. Get Service from URL (e.g., service-details.html?type=Electrician)
    const params = new URLSearchParams(window.location.search);
    const serviceType = params.get('type') || 'Electrician';
    
    document.getElementById('serviceTag').innerText = serviceType;
    const pluralMap = {
    'Electrician': 'Electricians',
    'Plumbing': 'Plumbers',
    'Cleaning': 'Cleaners',
    'Carpenter': 'Carpenters'
};
    document.getElementById('serviceTitle').innerText =  (pluralMap[serviceType] || serviceType + 's') + ' Near You';

    const container = document.getElementById('providerContainer');
    let selectedProvider = "";

    // 3. Load Providers
    if (allData[serviceType]) {
        allData[serviceType].forEach((p, index) => {
            const card = document.createElement('div');
            card.className = `provider-card ${index === 0 ? 'active' : ''}`;
            if(index === 0) selectedProvider = p.name; // Default first one

            card.innerHTML = `
                <img src="${p.img||'https://via.placeholder.com/50'}" alt="user">
                <div class="provider-info">
                    <h4>${p.name}</h4>
                    <p>⭐ ${p.rating} | ₹${p.price} visit fee</p>
                </div>
            `;

            card.onclick = function() {
                document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedProvider = p.name;
                document.getElementById('selectedProviderText').innerHTML = "Booking with: <b>" + p.name + "</b>";
            };
            container.appendChild(card);
        });
    }

    // Set initial text
    document.getElementById('selectedProviderText').innerHTML = "Booking with: <b>" + selectedProvider + "</b>";
    document.getElementById('bookDate').min = new Date().toISOString().split("T")[0];

    // 4. Handle Final Submit
document.getElementById('finalBookingForm').addEventListener('submit', function(e) {
    e.preventDefault();

    let date = document.getElementById('bookDate').value;
    let time = document.getElementById('bookTime').value;
    let address = document.querySelector('input[placeholder="Explain the problem briefly..."]').value;

    if(!selectedProvider) {
        alert("Please select a provider first!");
        return;
    }

    let formData = new FormData();
    formData.append('service', serviceType + ' - ' + selectedProvider);
    formData.append('date', date);
    formData.append('time', time);
    formData.append('address', address);

    fetch('/HomeEase/backend/book_service.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === 'success') {
            alert('Booking confirmed with ' + selectedProvider + ' ✅');
            window.location.href = 'dashboard.html';
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(() => {
        alert('Server error ❌');
    });
});
function showNotification() {
    alert("No new notifications 🔔");
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
}
function showToast(msg, type = "success") {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        background: ${type === "success" ? "#ff9800" : "#e53935"};
        color: white; padding: 12px 25px;
        border-radius: 25px; font-family: Poppins;
        font-size: 14px; z-index: 9999;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        animation: fadeUp 0.4s ease;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
</script>

</body>
</html>
